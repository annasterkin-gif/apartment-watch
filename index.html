<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apartment Watch</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; padding: 0 0 40px; }
    nav { background: #1a3a5c; padding: 0 24px; display: flex; gap: 4px; align-items: center; }
    .tab { display: inline-block; padding: 14px 22px; color: #a8c4e0; text-decoration: none; font-size: .95rem; font-weight: 600; border-bottom: 3px solid transparent; transition: color .15s; cursor: pointer; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #5ba3f5; }
    .lang-toggle { margin-inline-start: auto; padding: 6px 14px; background: rgba(255,255,255,.12); color: #d0e4f7; border-radius: 6px; text-decoration: none; font-size: .82rem; font-weight: 700; letter-spacing: .05em; transition: background .15s; cursor: pointer; border: none; }
    .lang-toggle:hover { background: rgba(255,255,255,.22); color: #fff; }
    .page { max-width: 680px; margin: 32px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); padding: 32px; }
    h1 { font-size: 1.4rem; margin-bottom: 6px; color: #1a3a5c; }
    .subtitle { color: #666; font-size: .9rem; margin-bottom: 28px; }
    .flash { border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: .95rem; }
    .flash.ok  { background: #e6f9f0; color: #1a6b3a; border: 1px solid #a3d9b5; }
    .flash.err { background: #fdecea; color: #8b1a1a; border: 1px solid #f5a0a0; }
    .flash.run { background: #e8f0fe; color: #1a3a8b; border: 1px solid #9db8f5; }
    label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 6px; color: #334; }
    .hint { font-weight: 400; font-size: .78rem; color: #888; margin-inline-start: 6px; }
    input[type="text"], input[type="number"] { width: 100%; padding: 10px 12px; border: 1px solid #ccd; border-radius: 8px; font-size: 1rem; margin-bottom: 20px; transition: border-color .2s; }
    input[type="text"]:focus, input[type="number"]:focus { outline: none; border-color: #4a7fc1; box-shadow: 0 0 0 3px rgba(74,127,193,.15); }
    .row { display: flex; gap: 16px; }
    .row > div { flex: 1; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4a7fc1; }
    .checkbox-row label { margin: 0; cursor: pointer; font-size: 1rem; }
    .buttons { display: flex; gap: 12px; flex-wrap: wrap; }
    button { flex: 1; padding: 12px 20px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: filter .15s; }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .5; cursor: not-allowed; filter: none; }
    .btn-save { background: #4a7fc1; color: #fff; }
    .btn-run  { background: #2e7d46; color: #fff; }
    hr.divider { border: none; border-top: 1px solid #eee; margin: 28px 0; }
    .log-section h2 { font-size: 1rem; color: #444; margin-bottom: 12px; }
    pre#log { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 16px; font-size: .8rem; line-height: 1.5; max-height: 340px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .run-meta { font-size: .85rem; color: #666; margin-bottom: 20px; }
    .apt-grid { display: flex; flex-direction: column; gap: 16px; }
    .apt-card { background: #fff; border-radius: 10px; padding: 20px 24px; box-shadow: 0 1px 6px rgba(0,0,0,.08); border-inline-start: 4px solid #4a7fc1; }
    .apt-card .apt-title { font-size: 1.05rem; font-weight: 700; color: #1a3a5c; margin-bottom: 10px; }
    .apt-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 600; }
    .badge-yad2      { background: #dbeafe; color: #1e40af; }
    .badge-fb-market { background: #e0f2fe; color: #0369a1; }
    .badge-fb-posts  { background: #ede9fe; color: #5b21b6; }
    .badge-shelter   { background: #dcfce7; color: #166534; }
    .badge-price     { background: #fef9c3; color: #854d0e; }
    .badge-rooms     { background: #f1f5f9; color: #475569; }
    .apt-desc { font-size: .85rem; color: #555; line-height: 1.5; margin-bottom: 10px; }
    .apt-link a { font-size: .85rem; color: #2563eb; word-break: break-all; }
    .apt-phone { font-size: .85rem; color: #444; margin-top: 4px; }
    .apt-group { font-size: .85rem; color: #6b21a8; margin-top: 4px; }
    .apt-group a { color: #7c3aed; }
    .empty-state { text-align: center; color: #888; padding: 48px 0; font-size: 1rem; }
    .loading { text-align: center; color: #888; padding: 48px 0; }
  </style>
</head>
<body>

<nav id="nav"></nav>
<div class="page" id="page"></div>

<script>
const T = {
  he: {
    dir: "rtl", lang: "he", langToggle: "EN",
    tabSettings: "⚙️ הגדרות", tabResults: "🏘 תוצאות",
    subtitle: "הגדר את פרמטרי החיפוש ולחץ שמור. הסוכן יחפש דירות עם מקלט ביד2 ובפייסבוק.",
    labelCity: "עיר", hintCity: "(בעברית, לדוגמה: פרדס חנה)", placeholderCity: "פרדס חנה",
    labelRoomsMin: "מספר חדרים — מינימום", labelRoomsMax: "מספר חדרים — מקסימום",
    labelPrice: "מחיר מקסימלי (₪ לחודש)", hintPrice: "ריק = ללא הגבלה",
    labelShelter: "חובה: מקלט בבניין",
    btnSave: "💾 שמור הגדרות", btnRun: "▶ שמור והפעל עכשיו",
    logTitle: "📋 לוג הרצה", linkResults: "← צפה בתוצאות",
    flashSaved: "✓ ההגדרות נשמרו.", flashRunning: "▶ הסוכן פועל — הלוג מוצג למטה.",
    flashAlready: "⚠ הרצה כבר פעילה, המתן לסיומה.", flashError: "שגיאה בחיבור לשרת.",
    resultsTitle: "🏘 תוצאות", lastRun: "הרצה אחרונה:", newListings: "דירות חדשות",
    refresh: "רענן", noResults: "עדיין אין תוצאות.",
    noResultsRun: 'לחץ <a href="#" onclick="showTab(\'settings\')" style="color:#2563eb">הפעל עכשיו</a> בלשונית ההגדרות.',
    noNew: "לא נמצאו דירות חדשות בהרצה האחרונה.", noTitle: "(ללא כותרת)",
    badgeYad2: "יד2", badgeFbPosts: "פוסט FB", badgeShelter: "✓ מקלט", badgeRooms: "חדרים",
    linkOpen: "פתח מודעה ↗", groupLabel: "👥 קבוצה:", groupJoin: "הצטרף ↗",
    loading: "טוען...",
  },
  en: {
    dir: "ltr", lang: "en", langToggle: "עב",
    tabSettings: "⚙️ Settings", tabResults: "🏘 Results",
    subtitle: "Set your search parameters and click Save. The agent will search for apartments on Yad2 and Facebook.",
    labelCity: "City", hintCity: "(in Hebrew, e.g. פרדס חנה)", placeholderCity: "פרדס חנה",
    labelRoomsMin: "Rooms — minimum", labelRoomsMax: "Rooms — maximum",
    labelPrice: "Max price (₪/month)", hintPrice: "leave blank = no limit",
    labelShelter: "Required: shelter in building",
    btnSave: "💾 Save settings", btnRun: "▶ Save & Run now",
    logTitle: "📋 Run log", linkResults: "→ View results",
    flashSaved: "✓ Settings saved.", flashRunning: "▶ Agent is running — log shown below.",
    flashAlready: "⚠ A run is already in progress, please wait.", flashError: "Error connecting to server.",
    resultsTitle: "🏘 Results", lastRun: "Last run:", newListings: "new listings",
    refresh: "Refresh", noResults: "No results yet.",
    noResultsRun: 'Click <a href="#" onclick="showTab(\'settings\')" style="color:#2563eb">Run now</a> in the Settings tab.',
    noNew: "No new apartments found in the last run.", noTitle: "(no title)",
    badgeYad2: "Yad2", badgeFbPosts: "FB post", badgeShelter: "✓ Shelter", badgeRooms: "rooms",
    linkOpen: "Open listing ↗", groupLabel: "👥 Group:", groupJoin: "Join ↗",
    loading: "Loading...",
  },
};

let lang = localStorage.getItem("lang") || "he";
let activeTab = "settings";
let logEventSource = null;

function t() { return T[lang]; }

function esc(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

function toggleLang() { setLang(lang === 'he' ? 'en' : 'he'); }

function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  document.documentElement.lang = l;
  document.documentElement.dir  = T[l].dir;
  renderNav();
  if (activeTab === "settings") renderSettings();
  else renderResults();
}

function showTab(tab) {
  activeTab = tab;
  renderNav();
  if (tab === "settings") renderSettings();
  else renderResults();
}

// ── Nav ────────────────────────────────────────────────────────────────────────
function renderNav() {
  const tr = t();
  document.getElementById("nav").innerHTML = `
    <span class="tab ${activeTab === 'settings' ? 'active' : ''}" onclick="showTab('settings')">${tr.tabSettings}</span>
    <span class="tab ${activeTab === 'results'  ? 'active' : ''}" onclick="showTab('results')">${tr.tabResults}</span>
    <button class="lang-toggle" onclick="toggleLang()">${tr.langToggle}</button>
  `;
}

// ── Settings page ──────────────────────────────────────────────────────────────
async function renderSettings(flash) {
  const tr  = t();
  const page = document.getElementById("page");
  page.innerHTML = `<div class="loading">${tr.loading}</div>`;

  let cfg = { city_hebrew: "", rooms_min: 2, rooms_max: 4, price_max_ils: 8000, require_shelter: true };
  try {
    const r = await fetch(window.API_BASE + "/api/config");
    if (r.ok) cfg = await r.json();
  } catch {}

  const flashHtml = flash ? `<div class="flash ${flash.type}">${flash.msg}</div>` : "";

  page.innerHTML = `
    <div class="card">
      <h1>🏠 Apartment Watch</h1>
      <p class="subtitle">${tr.subtitle}</p>
      ${flashHtml}
      <div id="form-area">
        <label>${tr.labelCity} <span class="hint">${tr.hintCity}</span></label>
        <input type="text" id="city" value="${esc(cfg.city_hebrew)}" placeholder="${tr.placeholderCity}" dir="rtl">

        <div class="row">
          <div>
            <label>${tr.labelRoomsMin}</label>
            <input type="number" id="rooms_min" value="${cfg.rooms_min ?? ""}" min="1" max="20" step="0.5" placeholder="2">
          </div>
          <div>
            <label>${tr.labelRoomsMax}</label>
            <input type="number" id="rooms_max" value="${cfg.rooms_max ?? ""}" min="1" max="20" step="0.5" placeholder="4">
          </div>
        </div>

        <label>${tr.labelPrice} <span class="hint">${tr.hintPrice}</span></label>
        <input type="number" id="price" value="${cfg.price_max_ils ?? ""}" min="0" step="500" placeholder="8000">

        <div class="checkbox-row">
          <input type="checkbox" id="shelter" ${cfg.require_shelter ? "checked" : ""}>
          <label for="shelter">${tr.labelShelter}</label>
        </div>

        <div class="buttons">
          <button class="btn-save" id="btnSave" onclick="saveConfig(false)">${tr.btnSave}</button>
          <button class="btn-run"  id="btnRun"  onclick="saveConfig(true)">${tr.btnRun}</button>
        </div>
      </div>

      <hr class="divider">
      <div class="log-section" id="logSection" style="display:none">
        <h2>${tr.logTitle} <span class="spinner" id="spinner">⟳</span></h2>
        <pre id="log"></pre>
      </div>
    </div>
  `;
}

function getFormConfig() {
  return {
    city_hebrew:     document.getElementById("city").value.trim(),
    rooms_min:       parseFloat(document.getElementById("rooms_min").value) || null,
    rooms_max:       parseFloat(document.getElementById("rooms_max").value) || null,
    price_max_ils:   parseInt(document.getElementById("price").value)       || null,
    require_shelter: document.getElementById("shelter").checked,
  };
}

async function saveConfig(andRun) {
  const tr  = t();
  const cfg = getFormConfig();
  document.getElementById("btnSave").disabled = true;
  document.getElementById("btnRun").disabled  = true;

  try {
    const saveRes = await fetch(window.API_BASE + "/api/config", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg),
    });
    if (!saveRes.ok) throw new Error();
  } catch {
    renderSettings({ type: "err", msg: tr.flashError });
    return;
  }

  if (!andRun) {
    renderSettings({ type: "ok", msg: tr.flashSaved });
    return;
  }

  try {
    const runRes = await fetch(window.API_BASE + "/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cfg),
    });
    if (runRes.status === 409) {
      renderSettings({ type: "err", msg: tr.flashAlready });
      return;
    }
    if (!runRes.ok) throw new Error();
  } catch {
    renderSettings({ type: "err", msg: tr.flashError });
    return;
  }

  await renderSettings({ type: "run", msg: tr.flashRunning });
  startLogStream();
}

function startLogStream() {
  const tr = t();
  if (logEventSource) logEventSource.close();

  const logSection = document.getElementById("logSection");
  const logEl      = document.getElementById("log");
  const spinner    = document.getElementById("spinner");
  if (!logSection) return;

  logSection.style.display = "block";
  logEventSource = new EventSource(window.API_BASE + "/api/log-stream");

  logEventSource.onmessage = e => {
    logEl.textContent += e.data + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  };

  logEventSource.addEventListener("done", () => {
    spinner.style.display = "none";
    logEventSource.close();
    logEventSource = null;
    const link = document.createElement("a");
    link.href = "#";
    link.textContent = tr.linkResults;
    link.style.cssText = "display:block;margin-top:12px;color:#2563eb;font-weight:600";
    link.onclick = (e) => { e.preventDefault(); showTab("results"); };
    logEl.parentElement.appendChild(link);
  });
}

// ── Results page ───────────────────────────────────────────────────────────────
async function renderResults() {
  const tr   = t();
  const page = document.getElementById("page");
  page.innerHTML = `<div class="loading">${tr.loading}</div>`;

  let data;
  try {
    const r = await fetch(window.API_BASE + "/api/results");
    if (r.status === 404) { data = null; }
    else if (r.ok) { data = await r.json(); }
    else throw new Error();
  } catch {
    page.innerHTML = `
      <div class="card empty-state">
        <p>${tr.noResults}</p>
        <p style="margin-top:8px;font-size:.85rem">${tr.noResultsRun}</p>
      </div>`;
    return;
  }

  if (!data) {
    page.innerHTML = `
      <div class="card empty-state">
        <p>${tr.noResults}</p>
        <p style="margin-top:8px;font-size:.85rem">${tr.noResultsRun}</p>
      </div>`;
    return;
  }

  const items = data.items || [];
  const ts    = data.run_timestamp_local || "";
  const city  = data.city || "";

  function platformBadge(p) {
    if (p === "yad2")                return `<span class="badge badge-yad2">${tr.badgeYad2}</span>`;
    if (p === "facebook_marketplace") return `<span class="badge badge-fb-market">Marketplace</span>`;
    return                                   `<span class="badge badge-fb-posts">${tr.badgeFbPosts}</span>`;
  }

  const cards = items.length === 0
    ? `<div class="empty-state">${tr.noNew}</div>`
    : items.map(it => `
      <div class="apt-card">
        <div class="apt-title">${esc(it.title || tr.noTitle)}</div>
        <div class="apt-meta">
          ${platformBadge(it.platform)}
          ${it.hasShelter ? `<span class="badge badge-shelter">${tr.badgeShelter}</span>` : ""}
          ${it.priceText  ? `<span class="badge badge-price">₪ ${esc(it.priceText)}</span>` : ""}
          ${it.rooms      ? `<span class="badge badge-rooms">${esc(it.rooms)} ${tr.badgeRooms}</span>` : ""}
        </div>
        ${it.description_snippet ? `<div class="apt-desc">${esc(it.description_snippet.slice(0, 220))}</div>` : ""}
        ${it.contact ? `<div class="apt-phone">📞 ${esc(it.contact)}</div>` : ""}
        ${it.group_name && it.group_url
          ? `<div class="apt-group">${tr.groupLabel} <a href="${esc(it.group_url)}" target="_blank">${esc(it.group_name)} — ${tr.groupJoin}</a></div>`
          : it.group_name ? `<div class="apt-group">${tr.groupLabel} ${esc(it.group_name)}</div>` : ""}
        <div class="apt-link"><a href="${esc(it.url)}" target="_blank">${tr.linkOpen}</a></div>
      </div>`).join("");

  page.innerHTML = `
    <h1 style="margin-bottom:6px">${tr.resultsTitle} — ${esc(city)}</h1>
    <div class="run-meta">
      ${tr.lastRun} ${esc(ts)} &nbsp;·&nbsp; ${items.length} ${tr.newListings}
      <a href="#" onclick="renderResults()" style="margin-inline-start:12px;font-size:.8rem;color:#2563eb">${tr.refresh}</a>
    </div>
    <div class="apt-grid">${cards}</div>
  `;
}

// ── Init ───────────────────────────────────────────────────────────────────────
document.documentElement.lang = lang;
document.documentElement.dir  = T[lang].dir;
renderNav();
renderSettings();
</script>
</body>
</html>
